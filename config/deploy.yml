service: content-gen
image: berkantay/content-gen

servers:
  web:
    hosts:
      - 178.104.205.96

proxy:
  host: content-gen.openhook.dev
  app_port: 8000
  ssl: true
  healthcheck:
    interval: 3
    timeout: 5
    path: /health

registry:
  server: ghcr.io
  username: berkantay
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

env:
  clear:
    PORT: "8000"
    SEO_API_URL: "http://seo-api:3000"
  secret:
    - DATABASE_URL
    - TAVILY_API_KEY
    - SEO_API_TOKEN
    - API_BEARER_TOKEN
    - GEMINI_API_KEY
    - ANTHROPIC_API_KEY
